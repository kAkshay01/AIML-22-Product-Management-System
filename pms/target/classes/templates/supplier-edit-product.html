<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead('Edit Product')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div class="form-card">
        <h1 th:text="${formTitle}">Edit Product</h1>

        <form th:action="@{${formAction}}" th:object="${product}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" th:field="*{name}"/>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <div class="form-group">
                <label for="brand">Brand</label>
                <input type="text" id="brand" th:field="*{brand}"/>
                <span class="field-error" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></span>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" th:field="*{category}"/>
                <span class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
            </div>

            <div class="form-group">
                <label for="price">Price</label>
                <input type="number" step="0.01" min="0" id="price" th:field="*{price}"/>
                <span class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" min="0" id="quantity" th:field="*{quantity}"/>
                <span class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></span>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="https://example.com/photo.jpg"
                       oninput="document.getElementById('imgPreview').src=this.value; document.getElementById('imgPreview').style.display=this.value?'block':'none';"/>
                <span class="field-error" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></span>
                <img id="imgPreview" class="image-preview" th:src="*{imageUrl}" th:style="${product.imageUrl != null and !product.imageUrl.isEmpty()} ? 'display:block;' : ''" onerror="this.style.display='none';" alt="Preview"/>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Update</button>
                <a th:href="@{/supplier/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
