<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead('My Products')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Welcome, <span th:text="${username}"></span> 👋</h1>
        <div class="actions">
            <a th:href="@{/supplier/products/new}" class="btn btn-primary">➕ Add Product</a>
            <a th:href="@{/logout}" class="btn btn-secondary">Log Out</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/supplier/dashboard}" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search your products..."/>
        <button type="submit" class="btn btn-primary">🔍 Search</button>
        <a th:href="@{/supplier/dashboard}" class="btn btn-secondary" th:if="${keyword}">Clear</a>
    </form>

    <table class="product-table" th:if="${!products.isEmpty()}">
        <thead>
        <tr>
            <th>Image</th>
            <th>ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Description</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}" th:classappend="${product.quantity <= 5} ? 'low-stock' : ''">
            <td>
                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}" class="product-thumb" alt="Product image"
                     onerror="this.outerHTML='&lt;span class=&quot;product-thumb-placeholder&quot;&gt;📦&lt;/span&gt;';"/>
                <span th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}" class="product-thumb-placeholder">📦</span>
            </td>
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.brand}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${'₹' + #numbers.formatDecimal(product.price, 1, 2)}"></td>
            <td>
                <span th:text="${product.quantity}"></span>
                <span th:if="${product.quantity <= 5}" class="badge badge-warning">Low Stock</span>
            </td>
            <td th:text="${product.description}"></td>
            <td class="actions">
                <a th:href="@{/supplier/products/edit/{id}(id=${product.id})}" class="btn btn-small btn-secondary">Edit</a>
                <a th:href="@{/supplier/products/delete/{id}(id=${product.id})}"
                   class="btn btn-small btn-danger"
                   onclick="return confirm('Are you sure you want to delete this product?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${products.isEmpty()}" class="empty-state">You haven't listed any products yet.</p>
</div>
</body>
</html>
