<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead('My Dashboard')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Welcome, <span th:text="${username}"></span> 👋</h1>
        <div class="actions">
            <a th:href="@{/customer/cart}" class="btn btn-primary">🛒 View Cart</a>
            <a th:href="@{/logout}" class="btn btn-secondary">Log Out</a>
        </div>
    </div>
    <p class="hint">Browse the full product catalog below.</p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/customer/dashboard}" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by name or category..."/>
        <button type="submit" class="btn btn-primary">🔍 Search</button>
        <a th:href="@{/customer/dashboard}" class="btn btn-secondary" th:if="${keyword}">Clear</a>
    </form>

    <table class="product-table" th:if="${!products.isEmpty()}">
        <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Price</th>
            <th>Availability</th>
            <th>Description</th>
            <th>Cart</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td>
                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}" class="product-thumb" alt="Product image"
                     onerror="this.outerHTML='&lt;span class=&quot;product-thumb-placeholder&quot;&gt;📦&lt;/span&gt;';"/>
                <span th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}" class="product-thumb-placeholder">📦</span>
            </td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.brand}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${'₹' + #numbers.formatDecimal(product.price, 1, 2)}"></td>
            <td>
                <span th:if="${product.quantity > 0}" class="badge badge-success">In Stock</span>
                <span th:if="${product.quantity <= 0}" class="badge badge-danger">Out of Stock</span>
            </td>
            <td th:text="${product.description}"></td>
            <td>
                <form th:if="${product.quantity > 0}"
                      th:action="@{/customer/cart/add/{id}(id=${product.id})}" method="post"
                      style="display:flex; gap:6px; align-items:center;">
                    <input type="hidden" name="keyword" th:value="${keyword}"/>
                    <input type="number" name="quantity" value="1" min="1" th:max="${product.quantity}"
                           style="width:60px; padding:6px 8px; border:1px solid var(--slate-400); border-radius:6px;"/>
                    <button type="submit" class="btn btn-small btn-primary">🛒 Add</button>
                </form>
                <span th:if="${product.quantity <= 0}" class="hint" style="margin:0;">Unavailable</span>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${products.isEmpty()}" class="empty-state">No products found.</p>
</div>
</body>
</html>
