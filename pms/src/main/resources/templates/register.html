<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead('Register')}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container container-narrow">
    <div class="form-card">
        <h1>Create an Account</h1>
        <p class="hint">Register as a customer to browse the catalog, or as a supplier to list your own products.</p>

        <form th:action="@{/register}" th:object="${user}" method="post">

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}"/>
                <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}"/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}"/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}"/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label for="role">Account Type</label>
                <select id="role" th:field="*{role}">
                    <option value="">Select account type...</option>
                    <option th:each="r : ${roles}" th:value="${r}"
                            th:text="${r.name() == 'CUSTOMER'} ? 'Customer' : 'Supplier'"></option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">✅ Create Account</button>
                <a th:href="@{/login}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
